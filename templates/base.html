<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title }} | baioDigest</title>
    <script>
      (function () {
        const storageKey = "baiodigest-theme";
        const root = document.documentElement;
        const systemDark =
          window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        try {
          const savedTheme = localStorage.getItem(storageKey);
          if (savedTheme === "light" || savedTheme === "dark") {
            root.dataset.theme = savedTheme;
            return;
          }
        } catch (error) {
        }
        root.dataset.theme = systemDark ? "dark" : "light";
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <link rel="stylesheet" href="{{ url_for('static/style.css') }}" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header container">
        <div class="site-brand">
          <p class="site-kicker">Bio and AI research digest</p>
          <h1><a href="{{ url_for('index.html') }}">baioDigest</a></h1>
        </div>
        <nav aria-label="Primary">
          <ul>
            <li><a href="{{ url_for('index.html') }}">Home</a></li>
            <li><a href="{{ url_for('archive.html') }}">Archive</a></li>
            <li><a href="{{ url_for('queries.html') }}">Queries</a></li>
          </ul>
        </nav>
      </header>
      <main class="site-main container">
        {% block content %}{% endblock %}
      </main>
      <footer class="site-footer container">
        <div class="site-footer-inner">
          <p>Built by <a href="https://github.com/tosnam/baiodigest" target="_blank" rel="noopener noreferrer">@tosnam</a></p>
          <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false">Theme</button>
        </div>
      </footer>
    </div>
    <script src="{{ url_for('static/theme.js') }}"></script>
  </body>
</html>
