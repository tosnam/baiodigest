{% extends "base.html" %}
{% block content %}
<section class="archive-list">
  <div class="section-heading">
    <p class="eyebrow">All issues</p>
    <h2>Archive</h2>
  </div>
  {% for digest in digests %}
  <article class="archive-row">
    <div>
      <h3>{{ digest.date }}</h3>
      <p>논문 {{ digest.entries|length }}편</p>
    </div>
    <a href="{{ url_for('daily/' ~ digest.date ~ '.html') }}">열기</a>
  </article>
  {% endfor %}
</section>
{% endblock %}
